<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<body>
    <main >

         <h1>Focus on <span class="gradient-text">Today</span></h1>
         <div class="app-container">
            <h2>Today <img class="sun"src="icons8-sun-64.png" alt="sun"> </h2>
        
 <p class="progress-label">Raise the bar by completing your Goals</p><br>
<div id="label" class="progress-bar">
  <div class="progress-value"><span>2/3 completed</span></div>
  
</div>  
<p class="error-label">Please set all the  goals</p>
   <div class="goal-container ">
    <div class="custom-checkbox"><img class="check-icon" src="Vector 1 (1).svg "></div>
    <input id="first" class="goal-input" type="text"  placeholder="Add a New Goal">
   </div>

   <div class="goal-container">
    <div class="custom-checkbox"><img class="check-icon" src="Vector 1 (1).svg "></div>
    <input id="second" class="goal-input" type="text"  placeholder="Add a New Goal">
   </div>

   
   <div class="goal-container ">
    <div class="custom-checkbox"><img class="check-icon" src="Vector 1 (1).svg "></div>
    <input id="third" class="goal-input" type="text"  placeholder="Add a New Goal">
   </div>
   <div class="button-container"><div class="btn">
            <a href="#"><span style="color:black;font-weight: bold;">+</span></a>
        </div>
    </div>
   
   <p class="quote">One step Ahead Today</p>

         </div>
         
    </main>
